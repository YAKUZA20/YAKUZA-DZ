<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>YAKUZA DZ - النظام البسيط</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
        }

        body {
            background: #03050a;
            color: #fff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        input, textarea, .search-box input {
            -webkit-user-select: text !important;
            -moz-user-select: text !important;
            -ms-user-select: text !important;
            user-select: text !important;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 30% 40%, rgba(165, 29, 29, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 70% 60%, rgba(212, 175, 55, 0.05) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .popup-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.2s ease;
        }

        .popup-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .popup-card {
            background: linear-gradient(145deg, #1a1a2a, #0f0f1a);
            border: 2px solid #a51d1d;
            border-radius: 30px;
            padding: 25px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            position: relative;
            border-top: 5px solid #d4af37;
            max-height: 85vh;
            overflow-y: auto;
        }

        .popup-icon {
            font-size: 60px;
            text-align: center;
            margin-bottom: 15px;
        }

        .popup-title {
            font-size: 1.8rem;
            font-weight: bold;
            background: linear-gradient(135deg, #d4af37, #fff, #d4af37);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-align: center;
            margin-bottom: 15px;
        }

        .popup-message {
            font-size: 1.1rem;
            color: #fff;
            text-align: center;
            margin-bottom: 20px;
        }

        .popup-detail {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 20px;
            border-right: 3px solid #a51d1d;
        }

        .popup-detail-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            color: #b0b0c0;
            border-bottom: 1px dashed #444;
            padding-bottom: 6px;
        }

        .popup-detail-item span:last-child {
            color: #d4af37;
            font-weight: bold;
        }

        .popup-input {
            width: 100%;
            padding: 15px;
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid #a51d1d;
            border-radius: 25px;
            color: white;
            font-size: 1.1rem;
            margin-bottom: 20px;
            text-align: center;
        }

        .popup-input:focus {
            outline: none;
            border-color: #d4af37;
        }

        .popup-buttons {
            display: flex;
            gap: 12px;
        }

        .popup-btn {
            flex: 1;
            padding: 14px;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.1s ease;
            border: none;
            text-align: center;
        }

        .popup-btn:active {
            transform: scale(0.97);
        }

        .popup-btn.confirm {
            background: linear-gradient(145deg, #a51d1d, #6b1313);
            color: white;
            border: 1px solid #d4af37;
        }

        .popup-btn.cancel {
            background: linear-gradient(145deg, #2a2a35, #1a1a24);
            color: #b0b0b0;
            border: 1px solid #4a4a5a;
        }

        .top-header {
            background: rgba(10, 10, 16, 0.95);
            backdrop-filter: blur(10px);
            padding: 8px 16px;
            border-bottom: 2px solid #a51d1d;
            display: flex;
            align-items: center;
            gap: 12px;
            position: relative;
            z-index: 10;
            flex-shrink: 0;
            height: 60px;
        }

        .leader-icon {
            background: linear-gradient(145deg, #a51d1d, #6b1313);
            width: 40px;
            height: 40px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            border: 1px solid #d4af37;
            flex-shrink: 0;
        }

        .leader-info {
            flex: 1;
        }

        .leader-info h1 {
            font-size: 1.1rem;
            font-weight: 700;
            color: #d4af37;
        }

        .leader-info p {
            font-size: 0.65rem;
            color: #a0a0b5;
        }

        .stats-mini {
            background: rgba(30, 30, 42, 0.9);
            padding: 6px 12px;
            border-radius: 20px;
            border: 1px solid #a51d1d;
            color: #d4af37;
            font-weight: bold;
            font-size: 0.8rem;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .mode-toggle {
            background: rgba(30, 30, 42, 0.9);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            cursor: pointer;
            border: 1px solid #d4af37;
            transition: all 0.1s ease;
            flex-shrink: 0;
        }

        .mode-toggle:active {
            transform: scale(0.95);
        }

        .main-scroll {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 12px;
            padding-bottom: 100px;
            background: transparent;
            -webkit-overflow-scrolling: touch;
            scroll-behavior: smooth;
            position: relative;
            z-index: 1;
        }

        .main-scroll::-webkit-scrollbar {
            width: 3px;
        }

        .main-scroll::-webkit-scrollbar-track {
            background: #1a1a24;
        }

        .main-scroll::-webkit-scrollbar-thumb {
            background: #a51d1d;
        }

        .bottom-nav {
            background: rgba(8, 8, 14, 0.98);
            backdrop-filter: blur(10px);
            border-top: 2px solid #a51d1d;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2px;
            padding: 6px 4px;
            padding-bottom: max(10px, env(safe-area-inset-bottom));
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 100;
            min-height: 70px;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #808090;
            font-size: 0.6rem;
            cursor: pointer;
            transition: all 0.1s ease;
            position: relative;
            padding: 4px 0;
            border-radius: 12px;
        }

        .nav-item.active {
            color: #d4af37;
            background: rgba(165, 29, 29, 0.1);
        }

        .nav-item span:first-child {
            font-size: 1.4rem;
            margin-bottom: 2px;
        }

        @media (max-width: 360px) {
            .nav-item {
                font-size: 0.55rem;
            }
            .nav-item span:first-child {
                font-size: 1.2rem;
            }
        }

        .page {
            display: none;
            animation: fadeIn 0.2s ease;
        }

        .page.active {
            display: block;
        }

        .card {
            background: rgba(22, 22, 31, 0.9);
            backdrop-filter: blur(8px);
            border-radius: 25px;
            padding: 18px;
            margin-bottom: 18px;
            border: 1px solid rgba(165, 29, 29, 0.3);
            border-right: 4px solid #a51d1d;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(212, 175, 55, 0.2);
        }

        .card-header h2 {
            font-size: 1.2rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
            color: #d4af37;
        }

        .card-header h2 span {
            font-size: 1.5rem;
        }

        .badge-gold {
            background: linear-gradient(145deg, #d4af37, #9e7b1a);
            color: #000;
            padding: 5px 12px;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: bold;
            border: 1px solid #a51d1d;
        }

        .form-group {
            margin-bottom: 12px;
        }

        input, textarea {
            width: 100%;
            padding: 12px 15px;
            background: rgba(28, 28, 38, 0.8);
            border: 1px solid #2a2a3a;
            border-radius: 20px;
            color: white;
            font-size: 0.95rem;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: #a51d1d;
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 25px;
            font-weight: bold;
            font-size: 0.95rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.1s ease;
            margin-bottom: 8px;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn-success {
            background: linear-gradient(145deg, #1e6a1e, #0f3a0f);
            color: white;
            border: 1px solid #d4af37;
        }

        .btn-gold {
            background: linear-gradient(145deg, #d4af37, #9e7b1a);
            color: #000;
            font-weight: 800;
            border: 1px solid #a51d1d;
        }

        .member-item {
            background: rgba(26, 26, 36, 0.9);
            border-radius: 20px;
            padding: 14px;
            margin-bottom: 12px;
            border-right: 4px solid #a51d1d;
        }

        .member-item.warning-1 { border-right-color: #ffaa00; background: rgba(255, 170, 0, 0.1); }
        .member-item.warning-2 { border-right-color: #ff7700; background: rgba(255, 119, 0, 0.1); }
        .member-item.warning-3 { border-right-color: #ff0000; background: rgba(255, 0, 0, 0.1); }
        .member-item.blacklisted { border-right-color: #000; background: rgba(0, 0, 0, 0.3); }
        .member-item.kicked { border-right-color: #666; background: rgba(100, 100, 100, 0.1); }

        .member-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            flex-wrap: wrap;
            gap: 6px;
        }

        .member-name {
            font-weight: bold;
            font-size: 1rem;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 6px;
            color: #d4af37;
        }

        .warning-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.65rem;
            font-weight: bold;
            background: #ffaa00;
            color: #000;
        }

        .member-actions {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-top: 10px;
        }

        .action-btn {
            flex: 1;
            min-width: 65px;
            padding: 8px 6px;
            border: 1px solid #2a2a3a;
            background: rgba(37, 37, 48, 0.9);
            color: white;
            border-radius: 15px;
            font-size: 0.7rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.1s ease;
        }

        .action-btn:active {
            transform: scale(0.96);
        }

        .action-btn.delete-btn {
            background: #8b0000;
            border-color: #ffaa00;
        }

        .loading {
            text-align: center;
            padding: 30px;
            color: #a0a0b5;
        }

        /* وضع العضو - يخفي كل أزرار الإضافة والتعديل */
        .member-mode #addMemberCard {
            display: none !important;
        }

        .member-mode #addLawCard {
            display: none !important;
        }

        .member-mode .member-actions {
            display: none !important;
        }

        .member-mode .action-btn {
            display: none !important;
        }

        .member-mode .btn {
            display: none !important;
        }

        .member-mode .delete-btn {
            display: none !important;
        }

        .search-box {
            margin-bottom: 15px;
            position: relative;
        }

        .search-box input {
            padding-right: 35px;
            background: rgba(28, 28, 38, 0.9);
            border: 1px solid #a51d1d;
        }

        .search-box i {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #d4af37;
            font-size: 1rem;
        }

        .search-results-count {
            font-size: 0.7rem;
            color: #a0a0b5;
            margin-top: 5px;
            text-align: left;
        }

        .recruit-popup {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 3000;
            animation: fadeIn 0.3s ease;
        }

        .recruit-popup-content {
            background: linear-gradient(145deg, #1a1a2a, #0f0f1a);
            border: 2px solid #d4af37;
            border-radius: 40px;
            padding: 30px 25px;
            width: 90%;
            max-width: 380px;
            text-align: center;
            position: relative;
            box-shadow: 0 0 50px rgba(212, 175, 55, 0.3);
            animation: popIn 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        @keyframes popIn {
            0% {
                transform: scale(0.3);
                opacity: 0;
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .recruit-icon {
            font-size: 70px;
            background: linear-gradient(145deg, #a51d1d, #6b1313);
            width: 100px;
            height: 100px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: -55px auto 15px auto;
            border: 3px solid #d4af37;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .recruit-icon i {
            font-size: 50px;
            color: #d4af37;
        }

        .recruit-title {
            font-size: 1.6rem;
            font-weight: bold;
            background: linear-gradient(135deg, #d4af37, #fff, #d4af37);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin: 15px 0 10px;
        }

        .recruit-message {
            font-size: 1.1rem;
            color: #ddd;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .recruit-message strong {
            color: #d4af37;
            font-size: 1.2rem;
        }

        .recruit-details {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 20px;
            padding: 15px;
            margin: 15px 0;
            text-align: right;
        }

        .recruit-detail-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            color: #b0b0c0;
            border-bottom: 1px dashed #444;
            padding-bottom: 8px;
        }

        .recruit-detail-item span:first-child {
            color: #d4af37;
        }

        .recruit-detail-item span:last-child {
            color: white;
            font-weight: bold;
        }

        .recruit-btn {
            background: linear-gradient(145deg, #a51d1d, #6b1313);
            border: 2px solid #d4af37;
            color: white;
            padding: 12px 25px;
            border-radius: 35px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
            margin-top: 10px;
        }

        .block-popup {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 3000;
            animation: fadeIn 0.3s ease;
        }

        .block-popup-content {
            background: linear-gradient(145deg, #1a1a2a, #0f0f1a);
            border: 2px solid #ff0000;
            border-radius: 40px;
            padding: 30px 25px;
            width: 90%;
            max-width: 380px;
            text-align: center;
            position: relative;
            box-shadow: 0 0 50px rgba(255, 0, 0, 0.3);
            animation: popIn 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .block-icon {
            font-size: 70px;
            background: linear-gradient(145deg, #8b0000, #4a0000);
            width: 100px;
            height: 100px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: -55px auto 15px auto;
            border: 3px solid #ff0000;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .block-icon i {
            font-size: 50px;
            color: #ff0000;
        }

        .block-title {
            font-size: 1.6rem;
            font-weight: bold;
            color: #ff0000;
            margin: 15px 0 10px;
        }

        .block-message {
            font-size: 1.1rem;
            color: #ddd;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .block-details {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 20px;
            padding: 15px;
            margin: 15px 0;
            text-align: right;
        }

        .block-detail-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            color: #b0b0c0;
            border-bottom: 1px dashed #444;
            padding-bottom: 8px;
        }

        .block-detail-item span:first-child {
            color: #ff0000;
        }

        .block-detail-item span:last-child {
            color: white;
            font-weight: bold;
        }

        .block-btn {
            background: linear-gradient(145deg, #8b0000, #4a0000);
            border: 2px solid #ff0000;
            color: white;
            padding: 12px 25px;
            border-radius: 35px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
            margin-top: 10px;
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body oncontextmenu="return false" ondragstart="return false" onselectstart="return false">
    <div class="top-header">
        <div class="leader-icon"><i class="fas fa-users"></i></div>
        <div class="leader-info">
            <h1>YAKUZA DZ</h1>
            <p>نظام إدارة بسيط</p>
        </div>
        <div class="stats-mini" id="globalStats">0</div>
        <div class="mode-toggle" id="modeToggle" onclick="toggleMode()"><i class="fas fa-unlock-alt"></i></div>
    </div>

    <div class="main-scroll" id="mainScroll">
        <div class="page active" id="pageMembers">
            <!-- هذي البطاقة تظهر للقائد فقط -->
            <div class="card" id="addMemberCard">
                <div class="card-header">
                    <h2><span>➕</span> تجنيد عضو جديد</h2>
                    <div class="badge-gold">للقائد فقط</div>
                </div>
                <div class="form-group">
                    <input type="text" id="memberName" placeholder="اسم العضو">
                </div>
                <button class="btn btn-success" onclick="addMember()">➕ تجنيد</button>
            </div>

            <div class="card">
                <div class="card-header">
                    <h2><span>🔍</span> البحث عن عضو</h2>
                </div>
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchMemberInput" placeholder="ابحث باسم العضو" onkeyup="filterMembers()">
                </div>
                <div id="searchResultsCount" class="search-results-count"></div>
            </div>

            <div class="card">
                <div class="card-header">
                    <h2><span>📋</span> قائمة الأعضاء</h2>
                    <div class="badge-gold" id="memberCount">0</div>
                </div>
                <div id="membersList"></div>
            </div>
        </div>

        <div class="page" id="pageBlacklist">
            <div class="card">
                <div class="card-header">
                    <h2><span>⬛</span> البلاك ليست</h2>
                </div>
                <div id="blacklistList"></div>
            </div>
            <div class="card">
                <div class="card-header">
                    <h2><span>🚫</span> المطرودين</h2>
                </div>
                <div id="kickedList"></div>
            </div>
        </div>

        <div class="page" id="pageLaws">
            <!-- هذي البطاقة تظهر للقائد فقط (إضافة قانون) -->
            <div class="card" id="addLawCard">
                <div class="card-header">
                    <h2><span>⚖️</span> إضافة قانون</h2>
                    <div class="badge-gold">للقائد فقط</div>
                </div>
                <div class="form-group">
                    <textarea id="newLawText" rows="3" placeholder="قانون جديد..."></textarea>
                </div>
                <button class="btn btn-gold" onclick="addLaw()">➕ إضافة</button>
            </div>
            <!-- هذي البطاقة تظهر للجميع (عرض القوانين) -->
            <div class="card">
                <div class="card-header">
                    <h2><span>📜</span> الدستور</h2>
                </div>
                <div id="lawsList"></div>
            </div>
        </div>
    </div>

    <div class="bottom-nav" id="bottomNav">

        const SUPABASE_URL = 'https://olwzfrtbssdnwmnlwgeu.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9sd3pmcnRic3Nkbndtbmx3Z2V1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkyNzI5MTAsImV4cCI6MjA5NDg0ODkxMH0.i4y_KKHR7qs6fSCqEHf6GA_IXBp-hWmyREAW06wClMs';
        
        let gangData = {
            members: [],
            blacklist: [],
            kicked: [],
            laws: []
        };

        let isLeader = false;
        let searchTerm = "";
        const LEADER_CODE = "30440";
        let syncInterval = null;
        let isSyncing = false;

        async function supabaseFetch(endpoint, method = 'GET', data = null) {
            try {
                const url = `${SUPABASE_URL}/rest/v1/${endpoint}`;
                const options = { 
                    method, 
                    headers: { 
                        'apikey': SUPABASE_ANON_KEY, 
                        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`, 
                        'Content-Type': 'application/json' 
                    } 
                };
                if (data && (method === 'POST' || method === 'PATCH')) options.body = JSON.stringify(data);
                const response = await fetch(url, options);
                if (!response.ok) return null;
                if (method === 'DELETE') return { success: true };
                return await response.json();
            } catch (error) { 
                console.error('Supabase error:', error);
                return null; 
            }
        }

        async function loadFromSupabase() {
            if (isSyncing) return;
            isSyncing = true;
            try {
                const [membersRes, blacklistRes, kickedRes, lawsRes] = await Promise.all([
                    supabaseFetch('members?select=*&order=created_at.desc'),
                    supabaseFetch('blacklist?select=*&order=created_at.desc'),
                    supabaseFetch('kicked?select=*&order=created_at.desc'),
                    supabaseFetch('laws?select=text&order=order_index')
                ]);
                
                if (membersRes && Array.isArray(membersRes)) {
                    gangData.members = membersRes.map(m => ({
                        id: m.id, name: m.name, warnings: m.warnings || 0
                    }));
                } else {
                    gangData.members = [];
                }
                
                if (blacklistRes && Array.isArray(blacklistRes)) gangData.blacklist = blacklistRes;
                else gangData.blacklist = [];
                
                if (kickedRes && Array.isArray(kickedRes)) gangData.kicked = kickedRes;
                else gangData.kicked = [];
                
                if (lawsRes && Array.isArray(lawsRes) && lawsRes.length > 0) {
                    gangData.laws = lawsRes.map(l => l.text);
                } else {
                    gangData.laws = [];
                }
                
                updateAll();
            } catch(e) { 
                console.error('Load error:', e);
            }
            finally { isSyncing = false; }
        }

        async function saveToSupabase(table, data) {
            return await supabaseFetch(table, 'POST', data);
        }

        async function updateInSupabase(table, id, data) {
            return await supabaseFetch(`${table}?id=eq.${id}`, 'PATCH', data);
        }

        async function deleteFromSupabase(table, id) {
            return await supabaseFetch(`${table}?id=eq.${id}`, 'DELETE');
        }

        function startAutoSync() {
            if (syncInterval) clearInterval(syncInterval);
            loadFromSupabase();
            syncInterval = setInterval(loadFromSupabase, 3000);
        }

        function applyMemberModeClass() {
            if (!isLeader) document.body.classList.add('member-mode');
            else document.body.classList.remove('member-mode');
        }

        function updateUIByMode() {
            const toggle = document.getElementById('modeToggle');
            if (toggle) {
                if (isLeader) { 
                    toggle.innerHTML = '<i class="fas fa-crown"></i>'; 
                    toggle.style.background = 'linear-gradient(145deg, #d4af37, #9e7b1a)';
                    toggle.style.border = '1px solid #a51d1d';
                } else { 
                    toggle.innerHTML = '<i class="fas fa-unlock-alt"></i>'; 
                    toggle.style.background = 'rgba(30, 30, 42, 0.9)';
                    toggle.style.border = '1px solid #d4af37';
                }
            }
        }

        function toggleMode() {
            if (isLeader) {
                isLeader = false;
                applyMemberModeClass();
                updateUIByMode();
                updateAll();
                showInfoPopup('🔓', 'وضع العضو', 'تم تسجيل الخروج من وضع القائد\nالآن يمكنك فقط عرض البيانات بدون تعديل');
                return;
            }
            showInputPopup('🔐', 'التحقق من الصلاحيات', 'أدخل كود القائد للمتابعة', 'كود القائد', function(code) {
                if (code === LEADER_CODE) {
                    isLeader = true;
                    applyMemberModeClass();
                    updateUIByMode();
                    updateAll();
                    showInfoPopup('👑', 'وضع القائد', 'تم تفعيل وضع القائد\nيمكنك الآن إضافة وتعديل البيانات');
                } else if (code) showInfoPopup('❌', 'خطأ', 'الكود غير صحيح');
            });
        }

        function showDeletePopup(title, message, detail, onConfirm) {
            if (!isLeader) return;
            document.getElementById('deleteTitle').innerText = title;
            document.getElementById('deleteMessage').innerText = message;
            document.getElementById('deleteDetail').innerHTML = detail;
            window.deleteConfirmCallback = onConfirm;
            document.getElementById('deletePopup').classList.add('active');
        }
        function closeDeletePopup() { document.getElementById('deletePopup').classList.remove('active'); }
        function confirmDelete() { if (window.deleteConfirmCallback) window.deleteConfirmCallback(); closeDeletePopup(); }

        function showInputPopup(icon, title, message, placeholder, onConfirm) {
            document.getElementById('inputIcon').innerHTML = icon;
            document.getElementById('inputTitle').innerText = title;
            document.getElementById('inputMessage').innerText = message;
            document.getElementById('inputField').placeholder = placeholder;
            document.getElementById('inputField').value = '';
            window.inputConfirmCallback = onConfirm;
            document.getElementById('inputPopup').classList.add('active');
            document.getElementById('inputField').focus();
        }
        function closeInputPopup() { document.getElementById('inputPopup').classList.remove('active'); }
        function confirmInput() {
            let value = document.getElementById('inputField').value.trim();
            if (window.inputConfirmCallback) window.inputConfirmCallback(value);
            closeInputPopup();
        }

        function showInfoPopup(icon, title, message, detail = '') {
            document.getElementById('infoIcon').innerHTML = icon;
            document.getElementById('infoTitle').innerText = title;
            document.getElementById('infoMessage').innerText = message;
            document.getElementById('infoDetail').innerHTML = detail;
            document.getElementById('infoPopup').classList.add('active');
        }
        function closeInfoPopup() { document.getElementById('infoPopup').classList.remove('active'); }

        function showBlockPopup(name, type, info) {
            const popup = document.createElement('div');
            popup.className = 'block-popup';

            let iconHtml = type === 'blacklist' ? '<i class="fas fa-skull"></i>' : '<i class="fas fa-ban"></i>';
            let reasonText = type === 'blacklist' ? (info.reason || 'بلاك ليست') : (info.reason || 'تم الطرد');
            
            popup.innerHTML = `
                <div class="block-popup-content">
                    <div class="block-icon">
                        ${iconHtml}
                    </div>
                    <div class="block-title">🚫 تم رفض التجنيد 🚫</div>

                        العضو <strong>${name}</strong> موجود في قائمة <strong style="color:#ff0000">${typeText}</strong>!
                    </div>
                    <div class="block-details">
                        <div class="block-detail-item">
                            <span><i class="fas fa-user"></i> الاسم:</span>
                            <span>${name}</span>
                        </div>
                        <div class="block-detail-item">

                        <div class="block-detail-item">

                        </div>
                    </div>
                    <button class="block-btn" onclick="this.closest('.block-popup').remove()">
                        <i class="fas fa-check"></i> حسناً

            document.body.appendChild(popup);
            setTimeout(() => {

        function showRecruitmentSuccessPopup(name) {
            const popup = document.createElement('div');
            popup.className = 'recruit-popup';
            popup.innerHTML = `
                <div class="recruit-popup-content">
                    <div class="recruit-icon">
                        <i class="fas fa-trophy"></i>
                    </div>
                    <div class="recruit-title">🎉 تم التجنيد بنجاح 🎉</div>
                    <div class="recruit-message">
                        مرحباً بك في العصابة يا <strong>${name}</strong>!
                    </div>
                    <div class="recruit-details">
                        <div class="recruit-detail-item" style="justify-content: center; border-bottom: none;">
                            <span style="color: #1e6a1e;"><i class="fas fa-check-circle"></i> انضم بنجاح إلى العصابة</span>
                        </div>
                    </div>
                    <button class="recruit-btn" onclick="this.closest('.recruit-popup').remove()">

                    </button>
                </div>
            `;

        function filterMembers() {
            searchTerm = document.getElementById('searchMemberInput').value.trim().toLowerCase();
            renderMembers();
        }

        function isNameDuplicate(name) {
            if (!name) return false;
            const normalizedName = name.trim().toLowerCase();
            return gangData.members.some(m => m.name.trim().toLowerCase() === normalizedName);
        }

        function isInBlacklist(name) {
            if (!name) return false;
            const normalizedName = name.trim().toLowerCase();
            return gangData.blacklist.some(b => b.name.trim().toLowerCase() === normalizedName);
        }

        function isInKicked(name) {
            if (!name) return false;
            const normalizedName = name.trim().toLowerCase();
            return gangData.kicked.some(k => k.name.trim().toLowerCase() === normalizedName);
        }

        function getBlacklistInfo(name) {
            const normalizedName = name.trim().toLowerCase();
            return gangData.blacklist.find(b => b.name.trim().toLowerCase() === normalizedName);
        }

        function getKickedInfo(name) {
            const normalizedName = name.trim().toLowerCase();
            return gangData.kicked.find(k => k.name.trim().toLowerCase() === normalizedName);
        }

        async function addMember() {
            if (!isLeader) return;
            let name = document.getElementById('memberName').value.trim();
            
            if (!name) { 
                showInfoPopup('⚠️', 'تنبيه', 'الرجاء إدخال اسم العضو');
                return;
            }
            
            if (isInBlacklist(name)) {
                let blacklistInfo = getBlacklistInfo(name);
                showBlockPopup(name, 'blacklist', blacklistInfo);
                return;
            }
            
            if (isInKicked(name)) {
                let kickedInfo = getKickedInfo(name);
                showBlockPopup(name, 'kicked', kickedInfo);
                return;
            }
            
            if (isNameDuplicate(name)) {
                showInfoPopup('⚠️', 'تنبيه', 'هذا العضو موجود بالفعل');
                return;
            }
            
            let newMember = {
                id: Date.now(),
                name: name,
                warnings: 0
            };
            
            try {
                const result = await saveToSupabase('members', newMember);
                if (result) {
                    await loadFromSupabase();
                    document.getElementById('memberName').value = '';
                    showRecruitmentSuccessPopup(name);
                } else {
                    showRecruitmentSuccessPopup(name);
                }
            } catch (error) {
                console.error('Add member error:', error);
                showRecruitmentSuccessPopup(name);
            }
        }

        async function deleteMember(id) {
            if (!isLeader) return;
            let member = gangData.members.find(m => m.id === id);
            if (!member) return;
            showDeletePopup('⚠️ حذف عضو', `هل أنت متأكد من حذف ${member.name}؟`, `<div class="popup-detail-item"><span>الاسم:</span><span>${member.name}</span></div>`, async function() {
                await deleteFromSupabase('members', id);
                await loadFromSupabase();
                showInfoPopup('🗑️', 'تم الحذف', `تم حذف ${member.name}`);
            });
        }

        async function addWarning(id) {
            if (!isLeader) return;
            let member = gangData.members.find(m => m.id === id);
            if (member) {
                let newWarnings = (member.warnings || 0) + 1;
                if (newWarnings >= 3) {
                    showDeletePopup('⚠️ تنبيه طرد', `تحذير: ${member.name} سيصل إلى 3 توبيخات وسيتم طرده تلقائياً. هل أنت متأكد؟`, `<div class="popup-detail-item"><span>الاسم:</span><span>${member.name}</span></div><div class="popup-detail-item"><span>التوبيخات الحالية:</span><span>${member.warnings}/3</span></div>`, async function() {
                        await deleteFromSupabase('members', id);
                        await saveToSupabase('kicked', {
                            id: member.id,
                            name: member.name,
                            reason: '3 توبيخات',
                            date: new Date().toLocaleString(),
                            warnings: newWarnings
                        });
                        await loadFromSupabase();
                        showInfoPopup('⚠️', 'تم الطرد', `${member.name} تم طرده بسبب 3 توبيخات`);
                    });
                } else {
                    showDeletePopup('⚠️ تأكيد التوبيخ', `هل أنت متأكد من توبيخ ${member.name}؟`, `<div class="popup-detail-item"><span>الاسم:</span><span>${member.name}</span></div><div class="popup-detail-item"><span>سيصبح العدد:</span><span>${newWarnings}/3</span></div>`, async function() {
                        await updateInSupabase('members', id, { warnings: newWarnings });
                        await loadFromSupabase();
                        showInfoPopup('⚠️', 'تم التوبيخ', `${member.name} عنده ${newWarnings}/3 توبيخات`);
                    });
                }
            }
        }

        async function removeWarning(id) {
            if (!isLeader) return;
            let member = gangData.members.find(m => m.id === id);
            if (member && member.warnings > 0) {
                let newWarnings = member.warnings - 1;
                showDeletePopup('✅ تأكيد إلغاء التوبيخ', `هل أنت متأكد من إلغاء توبيخ ${member.name}؟`, `<div class="popup-detail-item"><span>الاسم:</span><span>${member.name}</span></div><div class="popup-detail-item"><span>سيصبح العدد:</span><span>${newWarnings}/3</span></div>`, async function() {
                    await updateInSupabase('members', id, { warnings: newWarnings });
                    await loadFromSupabase();
                    showInfoPopup('✅', 'تم إلغاء التوبيخ', `${member.name} صار عنده ${newWarnings}/3 توبيخات`);
                });
            } else {
                showInfoPopup('⚠️', 'تنبيه', 'هذا العضو ليس لديه توبيخات لإلغائها');
            }
        }

        async function addToBlacklist(id) {
            if (!isLeader) return;
            let member = gangData.members.find(m => m.id === id);
            if (member) {
                showDeletePopup('⬛ إضافة للبلاك ليست', `هل أنت متأكد من إضافة ${member.name} للقائمة السوداء؟`, `<div class="popup-detail-item"><span>الاسم:</span><span>${member.name}</span></div>`, async function() {
                    await deleteFromSupabase('members', id);
                    await saveToSupabase('blacklist', {
                        id: member.id,
                        name: member.name,
                        reason: 'بلاك ليست',
                        date: new Date().toLocaleString()
                    });
                    await loadFromSupabase();
                    showInfoPopup('⬛', 'تمت الإضافة', `تمت إضافة ${member.name} للقائمة السوداء`);
                });
            }
        }

        async function removeFromBlacklist(name) {
            if (!isLeader) return;
            showDeletePopup('⬛ حذف من البلاك ليست', `هل أنت متأكد من حذف ${name} من البلاك ليست؟`, `<div class="popup-detail-item"><span>الاسم:</span><span>${name}</span></div>`, async function() {
                const item = gangData.blacklist.find(b => b.name === name);
                if (item) await deleteFromSupabase('blacklist', item.id);
                await loadFromSupabase();
                showInfoPopup('✅', 'تم الحذف', `تم حذف ${name} من البلاك ليست`);
            });
        }

        async function removeFromKicked(name) {
            if (!isLeader) return;
            showDeletePopup('🚫 حذف من المطرودين', `هل أنت متأكد من حذف ${name} من قائمة المطرودين؟`, `<div class="popup-detail-item"><span>الاسم:</span><span>${name}</span></div>`, async function() {
                const item = gangData.kicked.find(k => k.name === name);
                if (item) await deleteFromSupabase('kicked', item.id);
                await loadFromSupabase();
                showInfoPopup('✅', 'تم الحذف', `تم حذف ${name} من المطرودين`);
            });
        }

        async function addLaw() {
            if (!isLeader) return;
            let text = document.getElementById('newLawText').value.trim();
            if (text) {
                await saveToSupabase('laws', { text: text, order_index: gangData.laws.length });
                await loadFromSupabase();
                document.getElementById('newLawText').value = '';
                showInfoPopup('⚖️', 'تمت الإضافة', 'تمت إضافة قانون جديد');
            }
        }

        async function deleteLaw(index) {
            if (!isLeader) return;
            let law = gangData.laws[index];
            showDeletePopup('⚖️ حذف قانون', `هل أنت متأكد من حذف هذا القانون؟`, `<div class="popup-detail-item"><span>القانون:</span><span>${law}</span></div>`, async function() {
                const allLaws = await supabaseFetch('laws?select=id,text&order=order_index');
                if (allLaws && allLaws[index]) {
                    await deleteFromSupabase('laws', allLaws[index].id);
                }
                await loadFromSupabase();
                showInfoPopup('✅', 'تم الحذف', 'تم حذف القانون');
            });
        }

        function updateStats() {
            document.getElementById('memberCount').innerText = gangData.members.length;
            document.getElementById('globalStats').innerHTML = gangData.members.length + ' أعضاء';
        }

        function renderMembers() {
            let filteredMembers = gangData.members;
            if (searchTerm) {
                filteredMembers = gangData.members.filter(m => 
                    m.name.toLowerCase().includes(searchTerm)
                );
                document.getElementById('searchResultsCount').innerHTML = `🔍 تم العثور على ${filteredMembers.length} نتيجة من أصل ${gangData.members.length}`;
            } else {
                document.getElementById('searchResultsCount').innerHTML = `📋 إجمالي الأعضاء: ${gangData.members.length}`;
            }
            
            let html = '';
            filteredMembers.forEach(m => {
                let warningClass = 'normal';
                if (m.warnings === 1) warningClass = 'warning-1';
                if (m.warnings === 2) warningClass = 'warning-2';
                if (m.warnings === 3) warningClass = 'warning-3';
                let actions = '';
                if (isLeader) {
                    actions = `<div class="member-actions">
                        <button class="action-btn" onclick="addWarning(${m.id})"><i class="fas fa-exclamation-triangle"></i> توبيخ</button>
                        ${m.warnings>0?`<button class="action-btn" onclick="removeWarning(${m.id})"><i class="fas fa-undo-alt"></i> إلغاء توبيخ</button>`:''}
                        <button class="action-btn" onclick="addToBlacklist(${m.id})"><i class="fas fa-ban"></i> بلاك</button>
                        <button class="action-btn delete-btn" onclick="deleteMember(${m.id})"><i class="fas fa-trash"></i> حذف</button>
                    </div>`;
                }
                html += `<div class="member-item ${warningClass}">
                    <div class="member-row">
                        <div class="member-name"><i class="fas fa-user-circle"></i> ${m.name}${m.warnings>0?`<span class="warning-badge"><i class="fas fa-exclamation"></i> ${m.warnings}/3</span>`:''}</div>
                    </div>
                    ${actions}
                </div>`;
            });
            document.getElementById('membersList').innerHTML = html || '<div class="loading">لا يوجد أعضاء</div>';
        }

        function renderBlacklist() {
            let html = '';
            gangData.blacklist.forEach(b => {
                let action = '';
                if (isLeader) {
                    action = `<button class="action-btn delete-btn" onclick="removeFromBlacklist('${b.name}')"><i class="fas fa-trash"></i> حذف</button>`;
                }
                html += `<div class="member-item blacklisted">
                    <div class="member-row">
                        <span class="member-name"><i class="fas fa-skull"></i> ${b.name}</span>
                    </div>
                    <div class="member-details" style="font-size:0.7rem; color:#888;">${b.reason} | ${b.date}</div>
                    ${action}
                </div>`;
            });
            document.getElementById('blacklistList').innerHTML = html || '<div class="loading">البلاك ليست فارغة</div>';
        }

        function renderKicked() {
            let html = '';
            gangData.kicked.forEach(k => {
                let action = '';
                if (isLeader) {
                    action = `<button class="action-btn delete-btn" onclick="removeFromKicked('${k.name}')"><i class="fas fa-trash"></i> حذف</button>`;
                }
                html += `<div class="member-item kicked">
                    <div class="member-row">
                        <span class="member-name"><i class="fas fa-ban"></i> ${k.name}</span>
                    </div>
                    <div class="member-details" style="font-size:0.7rem; color:#888;">السبب: ${k.reason} | ${k.date}</div>
                    ${action}
                </div>`;
            });
            document.getElementById('kickedList').innerHTML = html || '<div class="loading">لا يوجد مطرودين</div>';
        }

        function renderLaws() {
            let html = '';
            gangData.laws.forEach((law, idx) => {
                let action = '';
                if (isLeader) {
                    action = `<button class="action-btn delete-btn" onclick="deleteLaw(${idx})"><i class="fas fa-trash"></i> حذف</button>`;
                }
                html += `<div class="member-item normal">
                    <div class="member-row">
                        <span class="member-name"><i class="fas fa-gavel"></i> ${law}</span>
                    </div>
                    ${action}
                </div>`;
            });
            document.getElementById('lawsList').innerHTML = html || '<div class="loading">لا توجد قوانين</div>';
        }

        function updateAll() {
            updateStats();
            renderMembers();
            renderBlacklist();
            renderKicked();
            renderLaws();
        }

        function switchPage(page, element) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            let pages = { members:'pageMembers', blacklist:'pageBlacklist', laws:'pageLaws' };
            document.getElementById(pages[page]).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            if (element) element.classList.add('active');
            document.getElementById('mainScroll').scrollTop = 0;
            
            if (page === 'members') {
                if (document.getElementById('searchMemberInput')) {
                    document.getElementById('searchMemberInput').value = '';
                }
                searchTerm = '';
                renderMembers();
            }
        }

        document.getElementById('deleteConfirmBtn').onclick = confirmDelete;
        document.getElementById('inputConfirmBtn').onclick = confirmInput;
        
        applyMemberModeClass();
        updateUIByMode();
        startAutoSync();
    </script>
</body>
</html>
